name: Daily Price Ingestion

on:
  schedule:
    - cron: "0 21 * * 1-5"
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python ingest_prices.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
